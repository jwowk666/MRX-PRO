<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MRX-PRO | Kingdom Identity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card" id="step1">
        <h1>مملكة الدراك</h1>
        <p>بإكمالك هذا التسجيل، أنت تقر بمسؤوليتك الكاملة.</p>
        <button onclick="show('step2')">موافق</button>
        <button onclick="window.close()" class="danger-btn">لا أوافق</button>
    </div>

    <div class="card hidden" id="step2">
        <h1>تسجيل الهوية</h1>
        <input type="text" id="name" placeholder="الاسم المستعار">
        <input type="email" id="email" placeholder="الجيميل الحقيقي">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="show('step3')">التالي</button>
    </div>

    <div class="card hidden" id="step3">
        <h1>ربط روبلوكس</h1>
        <input type="text" id="roblox" placeholder="اسمك في روبلوكس">
        <button onclick="send()">إنشاء الهوية</button>
    </div>

    <div class="card hidden" id="final">
        <h1>تم إنشاء الهوية</h1>
        <p id="codeDisplay" style="font-size: 24px; font-weight: bold; color: #d4af37;"></p>
        <p>احفظ هذا الكود الخاص بك.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
